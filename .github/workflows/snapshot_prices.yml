name: Daily Price History Snapshot

on:
  schedule:
    - cron: "0 4 * * *"  # Every day at 4:00am UTC (after AWIN sync at 2am)
  workflow_dispatch:       # Allow manual trigger

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Run price snapshot
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: python scripts/snapshot_prices.py
