<?xml version="1.0" encoding="UTF-8"?>
<svg width="370" height="200" viewBox="0 0 185 100" xmlns="http://www.w3.org/2000/svg">
  <title>Preisgucken.de Logo</title>
  <desc>Preisvergleich Deutschland</desc>

  <rect x="6" y="8" width="173" height="84" rx="10" fill="#fff" stroke="#e8e8e8" stroke-width="1"/>

  <!-- PG monogram -->
  <rect x="16" y="18" width="54" height="54" rx="7" fill="#fff" stroke="#1A3A6B" stroke-width="2.5"/>
  <text x="43" y="60" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="32" font-weight="900" fill="#1A3A6B">P</text>
  <circle cx="60" cy="25" r="10" fill="#E8872A"/>
  <text x="60" y="29" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="9" font-weight="900" fill="#fff">G</text>

  <!-- Wordmark -->
  <text x="80" y="42" font-family="Arial,sans-serif" font-size="11" font-weight="300" fill="#aaa" letter-spacing="3">preis</text>
  <text x="78" y="64" font-family="'Arial Black',Arial,sans-serif" font-size="24" font-weight="900" fill="#1A3A6B">gucken</text>

  <!-- Divider + tagline -->
  <line x1="16" y1="78" x2="173" y2="78" stroke="#eee" stroke-width="1"/>
  <text x="16" y="88" font-family="Arial,sans-serif" font-size="7.2" fill="#bbb" letter-spacing="1">PREISVERGLEICH · DEUTSCHLAND</text>

</svg>
